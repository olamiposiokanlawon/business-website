<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IN STOCK - NAYA'S FIND</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f4f4;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: #333;
        color: #fff;
    }

    .logo {
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        font-size: 1.5em;
        font-weight: bold;
    }

    header nav a {
        margin: 0 10px;
        color: #fff;
        text-decoration: none;
    }

    header .buttons button {
        margin-left: 10px;
        padding: 8px 16px;
        border: none;
        cursor: pointer;
    }

    .container {
        padding: 40px;
    }

    .page-title {
        text-align: center;
        margin-bottom: 40px;
        font-size: 2em;
        color: #333;
    }

    .cards {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 20px;
    }

    .card {
        background: #fff;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        width: calc(25% - 20px);
        text-align: center;
        box-sizing: border-box;
        border-radius: 8px;
        transition: transform 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 15px;
    }

    .card h3 {
        margin-bottom: 10px;
        font-size: 1.2em;
        text-transform: capitalize;
    }

    .card .price {
        font-size: 1.1em;
        font-weight: bold;
        color: #333;
        margin-top: 10px;
    }

    .card button {
        margin-top: 15px;
        padding: 10px 20px;
        background: #333;
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        width: 100%;
    }
</style>

<body>

    <header>
        <div class="logo">naya</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="stock.html">Stock</a>
        </nav>
        <div class="buttons">
            <button>Sign In</button>
            <button>Sign Up</button>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">OUR STOCK</h1>

        <section class="cards">
            <!-- Product 1 -->
            <div class="card">
                <img src="images/basket2k.jpeg" alt="Basket">
                <h3>Basket</h3>
                <div class="price">₦2,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/cup10.jpeg" alt="Cup">
                <h3>Cup</h3>
                <div class="price">₦10,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/hairband6.jpeg" alt="Hairband">
                <h3>Hairband</h3>
                <div class="price">₦6,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/handmade.jpeg" alt="Handmade Item">
                <h3>Handmade</h3>
                <div class="price">₦2,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/passport5.jpeg" alt="Passport Holder">
                <h3>Passport Holder</h3>
                <div class="price">₦5,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/phonestand8.jpeg" alt="Phone Stand">
                <h3>Phone Stand</h3>
                <div class="price">₦8,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/purse.jpeg" alt="Purse">
                <h3>Purse</h3>
                <div class="price">₦6,000</div>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/waterbottle10.jpeg" alt="Water Bottle">
                <h3>Water Bottle</h3>
                <div class="price">₦10,000</div>
                <button>Add to Cart</button>
            </div>
        </section>
    </div>

</body>

</html>

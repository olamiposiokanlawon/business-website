<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="styles/styles.css">
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;

    }

    .logo {
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        font-size: 1.5em;
        font-weight: bold;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: #212021;
        color: #fff;
    }

    header nav a {
        margin: 0 10px;
        color: #fff;
        text-decoration: none;
    }

    header .buttons button {
        margin-left: 10px;
        padding: 8px 16px;
        border: none;
        cursor: pointer;
    }

    .hero {

        justify-content: space-between;
        padding: 50px;
        background: #c1bbc1;
        height: 90vh;
    }

    .hero-text {
        max-width: 50%;
    }

    .hero-text h1 {
        font-size: 2.5em;
        margin-bottom: 20px;
    }

    .hero-text p {
        font-size: 1.2em;
        margin-bottom: 20px;
    }

    .hero-text button {
        padding: 12px 24px;
        background: #201f1f;
        color: #fff;
        border: none;
        cursor: pointer;
    }

    .cards {
        display: flex;
        justify-content: space-between;
        padding: 40px;
        margin-right: auto;
        gap: 20px;
    }

    .card {
        background: #c72470; 
        padding: 20px;
        box-shadow: 0 2px 5px rgba(226, 13, 13, 0.1);
        width: 30%;
        text-align: center;
    }

    .card h3 {
        margin-bottom: 10px;
    }
</style>

<body>

    <header>
        <div class="logo">NAYA</div>
        <nav>
            <a href="#">Home</a>
            <a href="about.html">About</a>

        </nav>
        <div class="buttons">

    <section class="hero">

        </div>
        <div class="hero-image">
            <img src="images/naya img.jpeg" alt="naya's find" width="300px">
        </div>
    </section>

    <section class="cards">
        <div class="card">
            <h3> </h3>
